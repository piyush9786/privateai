server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100M;

    # Docker's embedded DNS resolver, with a short TTL so nginx re-resolves
    # the backend's IP instead of caching it once at startup. Without this,
    # restarting the backend container (which gets a new internal IP) leaves
    # nginx pointing at a stale, now-unreachable address until nginx itself
    # is restarted.
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    location /exports/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/exports/;
        proxy_set_header Host $host;
    }

    location /health {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/health;
    }
}